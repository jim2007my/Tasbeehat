<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- PWA Configuration -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fcf9f4">
<link rel="apple-touch-icon" href="/icons/icon-384x384.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسبيحات - الأذكار</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #b78c4a; --primary-dark: #8b5e2c; --primary-light: #f5e6d3;
            --bg-main: #fcf9f4; --surface: #ffffff; --text-main: #2c3e4e;
            --text-muted: #6b7a88; --border-light: #e9e1d4;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.03), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-md: 0 20px 35px -8px rgba(0,0,0,0.04), 0 10px 15px -6px rgba(0,0,0,0.02);
            --shadow-lg: 0 25px 50px -12px rgba(0,0,0,0.08);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; /* هذا هو الجزء الذي ستضيفه */
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* القائمة الجانبية */
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; right: 0; top: 0; background: var(--surface); border-left: 1px solid var(--border-light); box-shadow: -5px 0 30px rgba(0,0,0,0.02); z-index: 2000; transition: var(--transition); display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .sidebar-header { padding: 0px 20px; text-align: center; border-bottom: 1px solid #e9e1d400; }
        .sidebar-logo { font-size: 2.2rem; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Amiri Quran', serif; font-weight: 700; margin-top: 20px; margin-bottom: 20px;}
        .sidebar-nav { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 14px 5px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: 600; color: var(--text-muted); transition: var(--transition); border: 1px solid transparent; text-decoration: none; }
        .nav-item:hover { background: var(--primary-light); color: var(--primary-dark); border-color: rgba(139, 94, 44, 0.15); transform: translateX(-5px); }
        .nav-item.active { background: linear-gradient(135deg, var(--primary-light), #fef9f0); color: var(--primary-dark); border-color: rgba(184, 134, 11, 0.2); font-weight: 700; box-shadow: var(--shadow-sm); }
        .nav-item i { font-size: 1.3rem; width: 30px; text-align: center; }
        
        /* المحتوى الرئيسي */
        .main-content { margin-right: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; align-items: center; transition: var(--transition); min-height: 100vh; }
        .mobile-header { display: none; width: 100%; padding: 15px 20px; align-items: center; justify-content: space-between; background: var(--bg-main); position: sticky; top: 0; z-index: 1500; border-bottom: 1px solid #e9e1d400; }
        .menu-toggle { background: var(--surface); border: 1px solid var(--border-light); font-size: 1.4rem; color: var(--text-main); cursor: pointer; width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: var(--transition); box-shadow: var(--shadow-sm); }
        .menu-toggle:hover { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(3px); z-index: 1900; opacity: 0; visibility: hidden; transition: var(--transition); }
        .overlay.open { opacity: 1; visibility: visible; }
        .view-section { display: none; width: 100%; max-width: 800px; padding: 40px 25px; flex-direction: column; align-items: center; flex: 1; animation: fadeSlide 0.4s ease; }
        .view-section.active { display: flex; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        /* قسم الأذكار */
        .azkar-wrapper { width: 100%; }
        .z-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; justify-content: center; }
        .z-card { background: var(--surface); padding: 30px 15px; border-radius: 28px; border: 1px solid var(--border-light); text-align: center; cursor: pointer; transition: var(--transition); display: flex; flex-direction: column; align-items: center; box-shadow: var(--shadow-sm); }
        .z-card:hover { border-color: var(--primary); transform: translateY(-8px) scale(1.02); box-shadow: var(--shadow-lg); }
        .z-icon { font-size: 2.8rem; color: var(--primary); margin-bottom: 18px; background: var(--primary-light); width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: var(--transition); }
        .z-card:hover .z-icon { background: var(--primary); color: white; }
        .z-title { font-size: 1.4rem; font-weight: 800; color: var(--text-main); margin-bottom: 10px; }
        .z-count-info { background: var(--bg-main); color: var(--text-muted); font-size: 0.95rem; padding: 6px 16px; border-radius: 30px; font-weight: 600; border: 1px solid var(--border-light); }
        
        .z-reader-header { display: flex; align-items: center; margin-bottom: 30px; gap: 20px; width: 100%; flex-wrap: wrap; }
        .z-cat-title { font-size: 2.2rem; color: var(--primary-dark); font-family: 'Amiri Quran', serif; flex: 1; text-align: center; }
        .z-item { background: var(--surface); padding: 35px; border-radius: 32px; border: 1px solid var(--border-light); margin-bottom: 25px; box-shadow: var(--shadow-sm); transition: var(--transition); }
        .z-item.completed { opacity: 0.7; border-color: #10b981; background: #f0fdf4; }
        .z-item-text { font-family: 'Amiri Quran', serif; font-size: 1.7rem; line-height: 2.2; color: var(--text-main); text-align: justify; margin-bottom: 30px; }
        .z-item-bottom { display: flex; justify-content: space-between; align-items: center; border-top: 2px dashed var(--border-light); padding-top: 25px; flex-wrap: wrap; gap: 15px; }
        .z-info { color: var(--text-muted); font-size: 0.95rem; font-weight: 600; flex: 1; line-height: 1.7; background: var(--bg-main); padding: 12px 20px; border-radius: 20px; border: 1px solid var(--border-light); }
        
        .z-btn-count { background: linear-gradient(145deg, var(--primary-light), #fff1e0); border: 2px solid var(--primary); color: var(--primary-dark); border-radius: 50px; padding: 14px 35px; font-weight: 800; font-size: 1.2rem; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 10px; min-width: 170px; justify-content: center; box-shadow: 0 6px 15px rgba(184, 134, 11, 0.1); }
        .z-btn-count:active { transform: scale(0.96); }
        .z-btn-count:hover:not(.done) { background: var(--primary); color: white; border-color: var(--primary-dark); box-shadow: 0 12px 25px -8px var(--primary); }
        .z-btn-count.done { background: #10b981; border-color: #059669; color: white; cursor: default; box-shadow: none; }
        
        .q-btn { background: var(--surface); border: 1px solid var(--border-light); color: var(--text-main); padding: 12px 25px; border-radius: 50px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; transition: var(--transition); box-shadow: var(--shadow-sm); text-decoration: none; }
        .q-btn:hover { background: var(--primary-light); color: var(--primary-dark); border-color: var(--primary); transform: translateY(-2px); }

        @media (max-width: 900px) {
            .sidebar { transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .mobile-header { display: flex; }
        }
        @media (max-width: 600px) {
            .z-reader-header { flex-direction: column-reverse; align-items: center; text-align: center; gap: 10px; }
            .z-item { padding: 25px 18px; }
            .z-item-text { font-size: 1.4rem; }
            .z-item-bottom { flex-direction: column-reverse; }
            .z-btn-count { width: 100%; }
            .q-btn { width: fit-content; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><i class="fa-solid fa-bahai"></i> تسبيحات</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-fingerprint"></i> المُسَبِّحَة</a>
            <a href="azkar.html" class="nav-item active"><i class="fa-solid fa-hands-praying"></i> الأذكار</a>
            <a href="quran.html" class="nav-item"><i class="fa-solid fa-book-open"></i> المصحف الشريف</a>
            <a href="radio.html" class="nav-item"><i class="fa-solid fa-radio"></i>إذاعة القرآن الكريم</a>
            <a href="prayer.html" class="nav-item"><i class="fa-solid fa-mosque"></i> مواقيت الصلاة</a>
            <a href="about.html" class="nav-item"><i class="fa-solid fa-circle-info"></i> من نحن</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="mobile-header">
            <h2 style="font-size: 1.4rem; font-weight: 800; color: var(--primary-dark);">الأذكار</h2>
            <button class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
        </div>

        <section id="view-azkar" class="view-section active">
            <div class="azkar-wrapper">
                <div id="z-list-view">
                    <h2 style="text-align: center; color: var(--primary-dark); font-family: 'Amiri Quran', serif; font-size: 2.5rem; margin-bottom: 30px;">حصن المسلم</h2>
                    <div class="z-grid" id="z-categories-container"></div>
                </div>
                
                <div id="z-reader-view" style="display: none;">
                    <div class="z-reader-header">
                        <button class="q-btn" onclick="z_showList()"><i class="fa-solid fa-arrow-right"></i> رجوع</button>
                        <h2 class="z-cat-title" id="z-cat-title">أذكار الصباح</h2>
                    </div>
                    <div id="z-items-container"></div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); }

        const z_categories = [
            { id: 'morning', title: 'أذكار الصباح', icon: 'fa-sun' },
            { id: 'evening', title: 'أذكار المساء', icon: 'fa-moon' }
        ];

        // قاعدة بيانات الأذكار
        const z_data = {
            'morning': [
                { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ<br>اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ.", count: 1, info: "من قالها حين يصبح أجير من الجن حتى يمسى ومن قالها حين يمسى أجير من الجن حتى يصبح." },
                { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ.", count: 3, info: "من قالها حين يصبح وحين يمسى كفته من كل شىء (الإخلاص والمعوذتين)." },
                { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ.", count: 3, info: "تكفيه من كل شيء." },
                { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ.", count: 3, info: "تكفيه من كل شيء." },
                { text: "أَصْـبَحْنا وَأَصْـبَحَ المُـلْكُ لله وَالحَمدُ لله ، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُـلكُ ولهُ الحَمْـد، وهُوَ على كلّ شَيءٍ قدير ، رَبِّ أسْـأَلُـكَ خَـيرَ ما في هـذا اليوم وَخَـيرَ ما بَعْـدَه ، وَأَعـوذُ بِكَ مِنْ شَـرِّ ما في هـذا اليوم وَشَرِّ ما بَعْـدَه، رَبِّ أَعـوذُبِكَ مِنَ الْكَسَـلِ وَسـوءِ الْكِـبَر ، رَبِّ أَعـوذُ بِكَ مِنْ عَـذابٍ في النّـارِ وَعَـذابٍ في القَـبْر.", count: 1, info: "من أذكار الصباح العظيمة." },
                { text: "اللّهـمَّ أَنْتَ رَبِّـي لا إلهَ إلاّ أَنْتَ ، خَلَقْتَنـي وَأَنا عَبْـدُك ، وَأَنا عَلـى عَهْـدِكَ وَوَعْـدِكَ ما اسْتَـطَعْـت ، أَعـوذُبِكَ مِنْ شَـرِّ ما صَنَـعْت ، أَبـوءُ لَـكَ بِنِعْـمَتِـكَ عَلَـيَّ وَأَبـوءُ بِذَنْـبي فَاغْفـِرْ لي فَإِنَّـهُ لا يَغْـفِرُ الذُّنـوبَ إِلاّ أَنْتَ.", count: 1, info: "سيد الاستغفار: من قالها موقنا بها حين يمسى ومات من ليلته دخل الجنة وكذلك حين يصبح." },
                { text: "رَضيـتُ بِاللهِ رَبَّـاً وَبِالإسْلامِ ديـناً وَبِمُحَـمَّدٍ صلى الله عليه وسلم نَبِيّـاً.", count: 3, info: "من قالها حين يصبح وحين يمسى كان حقا على الله أن يرضيه يوم القيامة." },
                { text: "اللّهُـمَّ إِنِّـي أَصْبَـحْتُ أُشْـهِدُك ، وَأُشْـهِدُ حَمَلَـةَ عَـرْشِـك ، وَمَلَائِكَتَكَ ، وَجَمـيعَ خَلْـقِك ، أَنَّـكَ أَنْـتَ اللهُ لا إلهَ إلاّ أَنْـتَ وَحْـدَكَ لا شَريكَ لَـك ، وَأَنَّ مُحَمّـداً عَبْـدُكَ وَرَسـولُـك.", count: 4, info: "من قالها أعتقه الله من النار." },
                { text: "اللّهُـمَّ ما أَصْبَـَحَ بي مِـنْ نِعْـمَةٍ أَو بِأَحَـدٍ مِـنْ خَلْـقِك ، فَمِـنْكَ وَحْـدَكَ لا شريكَ لَـك ، فَلَـكَ الْحَمْـدُ وَلَـكَ الشُّكْـر.", count: 1, info: "من قالها حين يصبح أدى شكر يومه." },
                { text: "حَسْبِـيَ اللّهُ لا إلهَ إلاّ هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم.", count: 7, info: "من قالها كفاه الله ما أهمه من أمر الدنيا والأخرة." },
                { text: "بِسـمِ اللهِ الذي لا يَضُـرُّ مَعَ اسمِـهِ شَيءٌ في الأرْضِ وَلا في السّمـاءِ وَهـوَ السّمـيعُ العَلـيم.", count: 3, info: "لم يضره من الله شيء." },
                { text: "اللّهُـمَّ بِكَ أَصْـبَحْنا وَبِكَ أَمْسَـينا ، وَبِكَ نَحْـيا وَبِكَ نَمُـوتُ وَإِلَـيْكَ النُّـشُور.", count: 1, info: "من أذكار الصباح." },
                { text: "أَصْبَـحْـنا عَلَى فِطْرَةِ الإسْلاَمِ، وَعَلَى كَلِمَةِ الإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إبْرَاهِيمَ حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ المُشْرِكِينَ.", count: 1, info: "من أذكار الصباح." },
                { text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ عَدَدَ خَلْـقِه ، وَرِضـا نَفْسِـه ، وَزِنَـةَ عَـرْشِـه ، وَمِـدادَ كَلِمـاتِـه.", count: 3, info: "تسبيح عظيم الأجر." },
                { text: "اللّهُـمَّ عافِـني في بَدَنـي ، اللّهُـمَّ عافِـني في سَمْـعي ، اللّهُـمَّ عافِـني في بَصَـري ، لا إلهَ إلاّ أَنْـتَ.", count: 3, info: "دعاء بالعافية." },
                { text: "اللّهُـمَّ إِنّـي أَعـوذُ بِكَ مِنَ الْكُـفر ، وَالفَـقْر ، وَأَعـوذُ بِكَ مِنْ عَذابِ القَـبْر ، لا إلهَ إلاّ أَنْـتَ.", count: 3, info: "استعاذة." },
                { text: "اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في الدُّنْـيا وَالآخِـرَة ، اللّهُـمَّ إِنِّـي أسْـأَلُـكَ العَـفْوَ وَالعـافِـيةَ في ديني وَدُنْـيايَ وَأهْـلي وَمالـي ، اللّهُـمَّ اسْتُـرْ عـوْراتي وَآمِـنْ رَوْعاتـي ، اللّهُـمَّ احْفَظْـني مِن بَـينِ يَدَيَّ وَمِن خَلْفـي وَعَن يَمـيني وَعَن شِمـالي ، وَمِن فَوْقـي ، وَأَعـوذُ بِعَظَمَـتِكَ أَن أُغْـتالَ مِن تَحْتـي.", count: 1, info: "دعاء الحفظ والعفو والعافية." },
                { text: "يَا حَيُّ يَا قيُّومُ بِرَحْمَتِكَ أسْتَغِيثُ أصْلِحْ لِي شَأنِي كُلَّهُ وَلاَ تَكِلْنِي إلَى نَفْسِي طَـرْفَةَ عَيْنٍ.", count: 3, info: "دعاء الاستغاثة برحمة الله." },
                { text: "أَصْبَـحْـنا وَأَصْبَـحْ المُـلكُ للهِ رَبِّ العـالَمـين ، اللّهُـمَّ إِنِّـي أسْـأَلُـكَ خَـيْرَ هـذا الـيَوْم ، فَـتْحَهُ ، وَنَصْـرَهُ ، وَنـورَهُ وَبَـرَكَتَـهُ ، وَهُـداهُ ، وَأَعـوذُ بِـكَ مِـنْ شَـرِّ ما فـيهِ وَشَـرِّ ما بَعْـدَه.", count: 1, info: "سؤال خير اليوم." },
                { text: "اللّهُـمَّ عالِـمَ الغَـيْبِ وَالشّـهادَةِ فاطِـرَ السّماواتِ وَالأرْضِ رَبَّ كـلِّ شَـيءٍ وَمَليـكَه ، أَشْهَـدُ أَنْ لا إِلـهَ إِلاّ أَنْت ، أَعـوذُ بِكَ مِن شَـرِّ نَفْسـي وَمِن شَـرِّ الشَّيْـطانِ وَشِرْكِهِ ، وَأَنْ أَقْتَـرِفَ عَلـى نَفْسـي سوءاً أَوْ أَجُـرَّهُ إِلـى مُسْـلِم.", count: 1, info: "استعاذة." },
                { text: "أَعـوذُ بِكَلِمـاتِ اللّهِ التّـامّـاتِ مِنْ شَـرِّ ما خَلَـق.", count: 3, info: "حفظ من شر ما خلق الله." },
                { text: "اللَّهُمَّ صَلِّ وَسَلِّمْ وَبَارِكْ على نَبِيِّنَا مُحمَّد.", count: 10, info: "من صلى علي حين يصبح وحين يمسى ادركته شفاعتى يوم القيامة." },
                { text: "اللَّهُمَّ إِنَّا نَعُوذُ بِكَ مِنْ أَنْ نُشْرِكَ بِكَ شَيْئًا نَعْلَمُهُ ، وَنَسْتَغْفِرُكَ لِمَا لَا نَعْلَمُهُ.", count: 3, info: "براءة من الشرك." },
                { text: "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ الْهَمِّ وَالْحَزَنِ، وَأَعُوذُ بِكَ مِنْ الْعَجْزِ وَالْكَسَلِ، وَأَعُوذُ بِكَ مِنْ الْجُبْنِ وَالْبُخْلِ، وَأَعُوذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ، وَقَهْرِ الرِّجَالِ.", count: 3, info: "استعاذة من الهم والحزن." },
                { text: "أسْتَغْفِرُ اللهَ العَظِيمَ الَّذِي لاَ إلَهَ إلاَّ هُوَ، الحَيُّ القَيُّومُ، وَأتُوبُ إلَيهِ.", count: 3, info: "استغفار عظيم." },
                { text: "يَا رَبِّ , لَكَ الْحَمْدُ كَمَا يَنْبَغِي لِجَلَالِ وَجْهِكَ , وَلِعَظِيمِ سُلْطَانِكَ.", count: 3, info: "ثناء على الله." },
                { text: "اللَّهُمَّ إِنِّي أَسْأَلُكَ عِلْمًا نَافِعًا، وَرِزْقًا طَيِّبًا، وَعَمَلًا مُتَقَبَّلًا.", count: 1, info: "سؤال العلم والرزق والعمل." },
                { text: "اللَّهُمَّ أَنْتَ رَبِّي لا إِلَهَ إِلا أَنْتَ ، عَلَيْكَ تَوَكَّلْتُ ، وَأَنْتَ رَبُّ الْعَرْشِ الْعَظِيمِ , مَا شَاءَ اللَّهُ كَانَ ، وَمَا لَمْ يَشَأْ لَمْ يَكُنْ ، وَلا حَوْلَ وَلا قُوَّةَ إِلا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ , أَعْلَمُ أَنَّ اللَّهَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ ، وَأَنَّ اللَّهَ قَدْ أَحَاطَ بِكُلِّ شَيْءٍ عِلْمًا , اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ شَرِّ نَفْسِي ، وَمِنْ شَرِّ كُلِّ دَابَّةٍ أَنْتَ آخِذٌ بِنَاصِيَتِهَا ، إِنَّ رَبِّي عَلَى صِرَاطٍ مُسْتَقِيمٍ.", count: 1, info: "ذكر طيب وحفظ." },
                { text: "لَا إلَه إلّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءِ قَدِيرِ.", count: 100, info: "كانت له عدل عشر رقاب، وكتبت له مئة حسنة، ومحيت عنه مئة سيئة، وكانت له حرزا من الشيطان." },
                { text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ.", count: 100, info: "حُطَّتْ خَطَايَاهُ وَإِنْ كَانَتْ مِثْلَ زَبَدِ الْبَحْرِ. لَمْ يَأْتِ أَحَدٌ يَوْمَ الْقِيَامَةِ بِأَفْضَلَ مِمَّا جَاءَ بِهِ إِلَّا أَحَدٌ قَالَ مِثْلَ مَا قَالَ أَوْ زَادَ عَلَيْهِ." },
                { text: "أسْتَغْفِرُ اللهَ وَأتُوبُ إلَيْهِ", count: 100, info: "مائة حسنة، ومُحيت عنه مائة سيئة، وكانت له حرزاً من الشيطان." }
            ],
            'evening': [
                { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ<br>اللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ.", count: 1, info: "من قالها حين يصبح أجير من الجن حتى يمسى ومن قالها حين يمسى أجير من الجن حتى يصبح." },
                { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ<br>آمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ ۚ كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِنْ رُسُلِهِ ۚ وَقَالُوا سَمِعْنَا وَأَطَعْنَا ۖ غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ... (الآيتان من آخر سورة البقرة).", count: 1, info: "من قرأ آيتين من آخر سورة البقرة في ليلة كفتاه." },
                { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ هُوَ ٱللَّهُ أَحَدٌ، ٱللَّهُ ٱلصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ.", count: 3, info: "من قالها حين يصبح وحين يمسى كفته من كل شىء." },
                { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ أَعُوذُ بِرَبِّ ٱلْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ ٱلنَّفَّٰثَٰتِ فِى ٱلْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ.", count: 3, info: "تكفيه من كل شيء." },
                { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم<br>قُلْ أَعُوذُ بِرَبِّ ٱلنَّاسِ، مَلِكِ ٱلنَّاسِ، إِلَٰهِ ٱلنَّاسِ، مِن شَرِّ ٱلْوَسْوَاسِ ٱلْخَنَّاسِ، ٱلَّذِى يُوَسْوِسُ فِى صُدُورِ ٱلنَّاسِ، مِنَ ٱلْجِنَّةِ وَٱلنَّاسِ.", count: 3, info: "تكفيه من كل شيء." },
                { text: "أَمْسَيْـنا وَأَمْسـى المـلكُ لله وَالحَمدُ لله ، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُـلكُ ولهُ الحَمْـد، وهُوَ على كلّ شَيءٍ قدير ، رَبِّ أسْـأَلُـكَ خَـيرَ ما في هـذهِ اللَّـيْلَةِ وَخَـيرَ ما بَعْـدَهـا ، وَأَعـوذُ بِكَ مِنْ شَـرِّ ما في هـذهِ اللَّـيْلةِ وَشَرِّ ما بَعْـدَهـا ، رَبِّ أَعـوذُبِكَ مِنَ الْكَسَـلِ وَسـوءِ الْكِـبَر ، رَبِّ أَعـوذُ بِكَ مِنْ عَـذابٍ في النّـارِ وَعَـذابٍ في القَـبْر.", count: 1, info: "من أذكار المساء العظيمة." },
                { text: "اللّهـمَّ أَنْتَ رَبِّـي لا إلهَ إلاّ أَنْتَ ، خَلَقْتَنـي وَأَنا عَبْـدُك ، وَأَنا عَلـى عَهْـدِكَ وَوَعْـدِكَ ما اسْتَـطَعْـت ، أَعـوذُبِكَ مِنْ شَـرِّ ما صَنَـعْت ، أَبـوءُ لَـكَ بِنِعْـمَتِـكَ عَلَـيَّ وَأَبـوءُ بِذَنْـبي فَاغْفـِرْ لي فَإِنَّـهُ لا يَغْـفِرُ الذُّنـوبَ إِلاّ أَنْتَ.", count: 1, info: "سيد الاستغفار: من قالها موقنا بها حين يمسى ومات من ليلته دخل الجنة." },
                { text: "رَضيـتُ بِاللهِ رَبَّـاً وَبِالإسْلامِ ديـناً وَبِمُحَـمَّدٍ صلى الله عليه وسلم نَبِيّـاً.", count: 3, info: "من قالها حين يصبح وحين يمسى كان حقا على الله أن يرضيه يوم القيامة." },
                { text: "اللّهُـمَّ إِنِّـي أَمسيتُ أُشْـهِدُك ، وَأُشْـهِدُ حَمَلَـةَ عَـرْشِـك ، وَمَلَائِكَتَكَ ، وَجَمـيعَ خَلْـقِك ، أَنَّـكَ أَنْـتَ اللهُ لا إلهَ إلاّ أَنْـتَ وَحْـدَكَ لا شَريكَ لَـك ، وَأَنَّ مُحَمّـداً عَبْـدُكَ وَرَسـولُـك.", count: 4, info: "من قالها أعتقه الله من النار." },
                { text: "اللّهُـمَّ ما أَمسى بي مِـنْ نِعْـمَةٍ أَو بِأَحَـدٍ مِـنْ خَلْـقِك ، فَمِـنْكَ وَحْـدَكَ لا شريكَ لَـك ، فَلَـكَ الْحَمْـدُ وَلَـكَ الشُّكْـر.", count: 1, info: "من قالها حين يمسى أدى شكر يومه." },
                { text: "حَسْبِـيَ اللّهُ لا إلهَ إلاّ هُوَ عَلَـيهِ تَوَكَّـلتُ وَهُوَ رَبُّ العَرْشِ العَظـيم.", count: 7, info: "من قالها كفاه الله ما أهمه من أمر الدنيا والأخرة." },
                { text: "بِسـمِ اللهِ الذي لا يَضُـرُّ مَعَ اسمِـهِ شَيءٌ في الأرْضِ وَلا في السّمـاءِ وَهـوَ السّمـيعُ العَلـيم.", count: 3, info: "لم يضره من الله شيء." },
                { text: "اللّهُـمَّ بِكَ أَمْسَـينا وَبِكَ أَصْـبَحْنا، وَبِكَ نَحْـيا وَبِكَ نَمُـوتُ وَإِلَـيْكَ الْمَصِيرُ.", count: 1, info: "من أذكار المساء." },
                { text: "أَمْسَيْنَا عَلَى فِطْرَةِ الإسْلاَمِ، وَعَلَى كَلِمَةِ الإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إبْرَاهِيمَ حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ المُشْرِكِينَ.", count: 1, info: "من أذكار المساء." },
                { text: "سُبْحـانَ اللهِ وَبِحَمْـدِهِ عَدَدَ خَلْـقِه ، وَرِضـا نَفْسِـه ، وَزِنَـةَ عَـرْشِـه ، وَمِـدادَ كَلِمـاتِـه.", count: 3, info: "تسبيح عظيم الأجر." },

        let z_currentList = [];
        let z_currentCatId = '';

        // وظيفة التحقق من اليوم وتصفير الأذكار تلقائياً
        function checkAndResetDaily() {
            const today = new Date().toDateString();
            const lastUpdate = localStorage.getItem('azkar_last_reset_date');
            
            if (lastUpdate !== today) {
                // إذا كان اليوم مختلفاً، نقوم بتصفير كافة الأذكار المحفوظة
                z_categories.forEach(cat => {
                    localStorage.removeItem('azkar_progress_' + cat.id);
                });
                // تحديث تاريخ آخر تصفير
                localStorage.setItem('azkar_last_reset_date', today);
            }
        }

        function z_init() {
            checkAndResetDaily(); // تحقق من التصفير عند تشغيل التطبيق
            const container = document.getElementById('z-categories-container');
            let html = '';
            z_categories.forEach(cat => {
                const azkarCount = (z_data[cat.id] || []).length;
                html += `<div class="z-card" onclick="z_loadCategory('${cat.id}', '${cat.title}')"><div class="z-icon"><i class="fa-solid ${cat.icon}"></i></div><div class="z-title">${cat.title}</div><div class="z-count-info">${azkarCount} أذكار</div></div>`;
            });
            container.innerHTML = html;
        }

        function z_loadCategory(id, title) {
            checkAndResetDaily(); // تحقق مرة أخرى عند تحميل الفئة
            z_currentCatId = id;
            document.getElementById('z-list-view').style.display = 'none';
            document.getElementById('z-reader-view').style.display = 'block';
            document.getElementById('z-cat-title').innerText = title;
            
            let savedData = localStorage.getItem('azkar_progress_' + id);
            if (savedData) {
                z_currentList = JSON.parse(savedData);
            } else {
                z_currentList = (z_data[id] || []).map(item => ({ ...item, currentCount: item.count }));
            }
            
            z_renderItems();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function z_renderItems() {
            const container = document.getElementById('z-items-container');
            let html = '';
            z_currentList.forEach((item, index) => {
                const isDone = item.currentCount === 0;
                html += `
                <div class="z-item ${isDone ? 'completed' : ''}" id="z-item-${index}">
                    <div class="z-item-text">${item.text}</div>
                    <div class="z-item-bottom">
                        <div class="z-info"><i class="fa-solid fa-circle-info" style="color:var(--primary); margin-left:5px;"></i> ${item.info}</div>
                        <button class="z-btn-count ${isDone ? 'done' : ''}" onclick="z_decrement(${index})" ${isDone ? 'disabled' : ''}>
                            ${isDone ? '<i class="fa-solid fa-check-double"></i> أُنجز' : `التكرار: <span style="font-family:'Cairo'; font-size:1.4rem; margin:0 5px;">${item.currentCount}</span>`}
                        </button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function z_decrement(index) {
            if (z_currentList[index].currentCount > 0) {
                z_currentList[index].currentCount--;
                if(navigator.vibrate) navigator.vibrate(10);
                localStorage.setItem('azkar_progress_' + z_currentCatId, JSON.stringify(z_currentList));
                z_renderItems();
            }
        }

        function z_showList() {
            document.getElementById('z-list-view').style.display = 'block';
            document.getElementById('z-reader-view').style.display = 'none';
        }

        window.onload = () => { z_init(); };
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed'));
    });
  }

  // أضف هذه الدالة الجديدة في قسم JavaScript
function scheduleMidnightReset() {
    const now = new Date();
    const midnight = new Date();
    midnight.setHours(24, 0, 0, 0); // 12 صباحاً (منتصف الليل)
    
    // حساب الوقت المتبقي حتى منتصف الليل
    let timeUntilMidnight = midnight - now;
    
    // إذا كان الوقت قد تجاوز منتصف الليل، نحدد موعد منتصف الليل القادم
    if (timeUntilMidnight < 0) {
        midnight.setDate(midnight.getDate() + 1);
        timeUntilMidnight = midnight - now;
    }
    
    // جدولة إعادة التعيين عند منتصف الليل
    setTimeout(() => {
        resetAllAzkarToOriginal();
        
        // إعادة جدولة العملية لكل 24 ساعة بعد ذلك
        setInterval(resetAllAzkarToOriginal, 24 * 60 * 60 * 1000);
    }, timeUntilMidnight);
    
    console.log(`سيتم إعادة تعيين الأذكار بعد ${Math.round(timeUntilMidnight / 1000 / 60)} دقيقة`);
}

// دالة إعادة تعيين جميع الأذكار إلى الإعدادات الأصلية
function resetAllAzkarToOriginal() {
    // تحديث تاريخ آخر تصفير
    const today = new Date().toDateString();
    localStorage.setItem('azkar_last_reset_date', today);
    
    // إعادة تعيين كل فئة من فئات الأذكار
    z_categories.forEach(cat => {
        // حذف التقدم المحفوظ
        localStorage.removeItem('azkar_progress_' + cat.id);
        
        // إذا كانت الفئة مفتوحة حالياً، نقوم بتحديث العرض
        if (z_currentCatId === cat.id) {
            // إعادة تحميل القائمة من البيانات الأصلية
            z_currentList = (z_data[cat.id] || []).map(item => ({ ...item, currentCount: item.count }));
            z_renderItems();
        }
    });
    
    // تحديث عرض القائمة الرئيسية إذا كانت ظاهرة
    if (document.getElementById('z-list-view').style.display !== 'none') {
        z_init(); // إعادة تهيئة العرض
    }
    
    // إظهار إشعار للمستخدم (اختياري)
    if ('Notification' in window && Notification.permission === 'granted') {
        new Notification('تم تجديد الأذكار', {
            body: 'تم إعادة تعيين جميع الأذكار إلى الإعدادات الأصلية',
            icon: '/icons/icon-192x192.png'
        });
    }
    
    console.log('تم إعادة تعيين جميع الأذكار في', new Date().toLocaleTimeString('ar-EG'));
}

// تعديل دالة checkAndResetDaily الموجودة
function checkAndResetDaily() {
    const today = new Date().toDateString();
    const lastUpdate = localStorage.getItem('azkar_last_reset_date');
    
    if (lastUpdate !== today) {
        // إذا كان اليوم مختلفاً، نقوم بتصفير كافة الأذكار المحفوظة
        resetAllAzkarToOriginal();
        return true;
    }
    return false;
}

// أضف هذا السطر في نهاية دالة window.onload
window.onload = () => { 
    z_init(); 
    
    // طلب إذن الإشعارات (اختياري)
    if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
    }
    
    // جدولة إعادة التعيين عند منتصف الليل
    scheduleMidnightReset();
    
    // التحقق كل دقيقة إذا كان الوقت قد تجاوز منتصف الليل (كخطة احتياطية)
    setInterval(() => {
        const now = new Date();
        if (now.getHours() === 0 && now.getMinutes() === 0) {
            // إذا كانت الساعة 12:00 بالضبط
            const today = new Date().toDateString();
            const lastUpdate = localStorage.getItem('azkar_last_reset_date');
            if (lastUpdate !== today) {
                resetAllAzkarToOriginal();
            }
        }
    }, 60000); // التحقق كل دقيقة
    
    // تسجيل Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('Service Worker registered'))
            .catch(err => console.log('Service Worker registration failed'));
    }
};
