<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <!-- PWA Configuration -->
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fcf9f4">
<link rel="apple-touch-icon" href="icons/icon-384x384.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسبيحات - مواقيت الصلاة</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #b78c4a;        /* ذهبي دافئ */
            --primary-dark: #8b5e2c;
            --primary-light: #f5e6d3;
            --bg-main: #fcf9f4;         /* خلفية بيج فاتح */
            --surface: #ffffff;
            --text-main: #2c3e4e;
            --text-muted: #6b7a88;
            --border-light: #e9e1d4;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.03), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-md: 0 20px 35px -8px rgba(0,0,0,0.04), 0 10px 15px -6px rgba(0,0,0,0.02);
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 260px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; /* هذا هو الجزء الذي ستضيفه */
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none; }
        body { background-color: var(--bg-main); color: var(--text-main); display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* القائمة الجانبية الموحدة */
        .sidebar { width: var(--sidebar-width); height: 100vh; position: fixed; right: 0; top: 0; background: var(--surface); border-left: 1px solid var(--border-light); box-shadow: -5px 0 30px rgba(0,0,0,0.02); z-index: 2000; transition: var(--transition); display: flex; flex-direction: column; backdrop-filter: blur(10px); }
        .sidebar-header { padding: 0px 20px; text-align: center; border-bottom: 1px solid #e9e1d400; }
        .sidebar-logo { font-size: 2.2rem; color: var(--primary); display: flex; align-items: center; justify-content: center; gap: 10px; font-family: 'Amiri Quran', serif; font-weight: 700; }
        .sidebar-nav { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-item { padding: 14px 5px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: 600; color: var(--text-muted); text-decoration: none; transition: var(--transition); border: 1px solid transparent; }
        .nav-item:hover { background: var(--primary-light); color: var(--primary-dark); transform: translateX(-5px); }
        .nav-item.active { background: linear-gradient(135deg, var(--primary-light), #fef9f0); color: var(--primary-dark); border-color: rgba(184, 134, 11, 0.2); font-weight: 700; box-shadow: var(--shadow-sm); }
        .nav-item i { font-size: 1.3rem; width: 30px; text-align: center; }
        
        .main-content { margin-right: var(--sidebar-width); flex: 1; display: flex; flex-direction: column; align-items: center; transition: var(--transition); min-height: 100vh; }
        .mobile-header { display: none; width: 100%; padding: 15px 20px; align-items: center; justify-content: space-between; background: var(--bg-main); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1500; border-bottom: 1px solid #e9e1d400; }
        .menu-toggle { background: var(--surface); border: 1px solid var(--border-light); font-size: 1.4rem; color: var(--text-main); cursor: pointer; width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; transition: var(--transition); box-shadow: var(--shadow-sm); }
        .overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1900; opacity: 0; visibility: hidden; transition: var(--transition); }
        .overlay.open { opacity: 1; visibility: visible; }

        /* ================= واجهة الهواتف الاحترافية ================= */
        .prayer-container { width: 100%; max-width: 600px; padding: 20px; display: flex; flex-direction: column; gap: 25px; margin: 0 auto; animation: fadeUp 0.6s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* بطاقة العداد العلوية (Hero Card) */
        .hero-card { background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 30px; padding: 35px 25px; color: white; position: relative; overflow: hidden; box-shadow: 0 20px 40px -10px rgba(15, 23, 42, 0.5); text-align: center; display: flex; flex-direction: column; align-items: center; }
        .hero-card::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(184, 134, 11, 0.15) 0%, transparent 60%); pointer-events: none; }
        
        .hero-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; z-index: 1; font-size: 0.95rem; opacity: 0.9; }
        .location-badge { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 8px 16px; border-radius: 20px; display: flex; align-items: center; gap: 8px; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.05); transition: var(--transition); }
        .location-badge:hover { background: rgba(255, 255, 255, 0.2); }
        
        .next-prayer-label { font-size: 1.1rem; font-weight: 500; color: rgba(255,255,255,0.7); margin-bottom: 5px; z-index: 1; }
        .next-prayer-name { font-family: 'Amiri Quran', serif; font-size: 3.5rem; font-weight: 700; color: var(--primary-light); margin-bottom: 20px; z-index: 1; line-height: 1.2; text-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .countdown-row { display: flex; justify-content: center; gap: 12px; z-index: 1; direction: ltr; }
        .time-segment { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 18px; width: 75px; padding: 12px 0; display: flex; flex-direction: column; align-items: center; }
        .time-segment span { font-size: 2.2rem; font-weight: 700; line-height: 1.1; }
        .time-segment small { font-size: 0.8rem; font-weight: 600; color: rgba(255,255,255,0.6); margin-top: 4px; }

        /* قائمة الصلوات (List View) */
        .prayer-list { display: flex; flex-direction: column; gap: 12px; }
        .prayer-row { background: var(--surface); border-radius: 20px; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-light); box-shadow: var(--shadow-sm); transition: var(--transition); position: relative; overflow: hidden; }
        
        .prayer-info { display: flex; align-items: center; gap: 18px; }
        .prayer-icon-box { width: 45px; height: 45px; border-radius: 14px; background: var(--bg-main); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 1.4rem; transition: var(--transition); }
        .prayer-row-name { font-size: 1.2rem; font-weight: 700; color: var(--text-main); transition: var(--transition); }
        
        .prayer-time-box { text-align: left; }
        .prayer-row-time { font-size: 1.5rem; font-weight: 800; color: var(--text-main); line-height: 1.2; font-family: sans-serif; }
        .prayer-row-ampm { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }

        /* حالة الصلاة القادمة (Active State) */
        .prayer-row.active { background: var(--primary); border-color: var(--primary-dark); box-shadow: var(--shadow-md); transform: scale(1.02); }
        .prayer-row.active .prayer-icon-box { background: rgba(255,255,255,0.2); color: white; }
        .prayer-row.active .prayer-row-name, .prayer-row.active .prayer-row-time, .prayer-row.active .prayer-row-ampm { color: white; }
        
        /* مؤشر التحميل */
        .loader-container { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 50px 0; width: 100%; color: var(--primary); }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(184, 134, 11, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* التجاوب */
        @media (max-width: 900px) {
            .sidebar { transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-right: 0; }
            .mobile-header { display: flex; }
            .prayer-container { padding: 15px; }
        }
        @media (max-width: 380px) {
            .hero-card { padding: 25px 15px; }
            .next-prayer-name { font-size: 2.8rem; }
            .time-segment { width: 65px; }
            .time-segment span { font-size: 1.8rem; }
            .prayer-row { padding: 15px 20px; }
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><i class="fa-solid fa-bahai"></i> تسبيحات</div>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-fingerprint"></i> المُسَبِّحَة</a>
            <a href="azkar.html" class="nav-item"><i class="fa-solid fa-hands-praying"></i> الأذكار</a>
            <a href="quran.html" class="nav-item"><i class="fa-solid fa-book-open"></i> المصحف الشريف</a>
            <a href="radio.html" class="nav-item"><i class="fa-solid fa-radio"></i> إذاعة القرآن الكريم</a>
            <a href="prayer.html" class="nav-item active"><i class="fa-solid fa-mosque"></i> مواقيت الصلاة</a>
            <a href="about.html" class="nav-item"><i class="fa-solid fa-circle-info"></i> من نحن</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="mobile-header">
            <h2 style="font-size: 1.4rem; font-weight: 800; color: var(--primary-dark);">مواقيت الصلاة</h2>
            <button class="menu-toggle" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></button>
        </div>

        <div class="loader-container" id="loader">
            <div class="spinner"></div>
            <p style="font-weight: 600;">جاري تحديد الموقع وجلب المواقيت...</p>
        </div>

        <div class="prayer-container" id="prayer-content" style="display: none;">
            
            <div class="hero-card">
                <div class="hero-header">
                    <div id="date-display" style="font-weight: 600;">--</div>
                    <div class="location-badge" onclick="getUserLocation()" title="تحديث الموقع">
                        <i class="fa-solid fa-location-crosshairs"></i>
                        <span id="location-text">موقعي</span>
                    </div>
                </div>
                
                <div class="next-prayer-label">يتبقى على صلاة</div>
                <div class="next-prayer-name" id="next-prayer-name">--</div>
                
                <div class="countdown-row">
                    <div class="time-segment">
                        <span id="cd-hours">00</span>
                        <small>ساعة</small>
                    </div>
                    <div class="time-segment">
                        <span id="cd-minutes">00</span>
                        <small>دقيقة</small>
                    </div>
                    <div class="time-segment">
                        <span id="cd-seconds">00</span>
                        <small>ثانية</small>
                    </div>
                </div>
            </div>

            <div class="prayer-list" id="prayer-list">
                </div>

        </div>
    </main>

    <script>
        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('open'); 
            document.getElementById('overlay').classList.toggle('open'); 
        }

        const prayersConfig = [
            { id: 'Fajr', name: 'الفجر', icon: 'fa-cloud-moon' },
            { id: 'Sunrise', name: 'الشروق', icon: 'fa-sun' },
            { id: 'Dhuhr', name: 'الظهر', icon: 'fa-sun' },
            { id: 'Asr', name: 'العصر', icon: 'fa-clock' },
            { id: 'Maghrib', name: 'المغرب', icon: 'fa-cloud-sun' },
            { id: 'Isha', name: 'العشاء', icon: 'fa-moon' }
        ];

        let prayerTimesData = {};
        let countdownInterval;

        // دالة البدء: تحاول جلب الموقع أولاً
        window.onload = () => {
            getUserLocation();
        };

        function getUserLocation() {
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('prayer-content').style.display = 'none';

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        document.getElementById('location-text').innerText = "تم التحديد";
                        fetchPrayerTimesByCoords(lat, lng);
                    },
                    (error) => {
                        console.warn("تم رفض الصلاحية أو فشل التحديد. سيتم استخدام القاهرة كافتراضي.");
                        document.getElementById('location-text').innerText = "القاهرة (افتراضي)";
                        fetchPrayerTimesByCity('Cairo', 'Egypt');
                    },
                    { timeout: 10000 }
                );
            } else {
                fetchPrayerTimesByCity('Cairo', 'Egypt');
            }
        }

        async function fetchPrayerTimesByCoords(lat, lng) {
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=5`);
                processApiResponse(await response.json());
            } catch (error) { showFetchError(); }
        }

        async function fetchPrayerTimesByCity(city, country) {
            try {
                const response = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=${country}&method=5`);
                processApiResponse(await response.json());
            } catch (error) { showFetchError(); }
        }

        function showFetchError() {
            alert("حدث خطأ في الاتصال. يرجى التحقق من الإنترنت.");
            document.getElementById('loader').style.display = 'none';
        }

        function processApiResponse(data) {
            if(data.code === 200) {
                const timings = data.data.timings;
                const dateInfo = data.data.date;
                
                prayersConfig.forEach(p => prayerTimesData[p.id] = timings[p.id]);

                document.getElementById('date-display').innerText = `${dateInfo.hijri.day} ${dateInfo.hijri.month.ar} ${dateInfo.hijri.year} هـ`;

                renderPrayerList();
                updateNextPrayerAndCountdown();
                
                if(countdownInterval) clearInterval(countdownInterval);
                countdownInterval = setInterval(updateNextPrayerAndCountdown, 1000);

                document.getElementById('loader').style.display = 'none';
                document.getElementById('prayer-content').style.display = 'flex';
            }
        }

        function formatTime12h(time24) {
            let [hours, minutes] = time24.split(':');
            hours = parseInt(hours);
            const ampm = hours >= 12 ? 'م' : 'ص';
            hours = hours % 12;
            hours = hours ? hours : 12;
            return { time: `${hours}:${minutes}`, ampm: ampm };
        }

        function renderPrayerList() {
            const list = document.getElementById('prayer-list');
            list.innerHTML = '';
            
            prayersConfig.forEach(prayer => {
                const timeStr = prayerTimesData[prayer.id];
                const formatted = formatTime12h(timeStr);
                
                const row = document.createElement('div');
                row.className = `prayer-row`;
                row.id = `row-${prayer.id}`;
                
                row.innerHTML = `
                    <div class="prayer-info">
                        <div class="prayer-icon-box"><i class="fa-solid ${prayer.icon}"></i></div>
                        <div class="prayer-row-name">${prayer.name}</div>
                    </div>
                    <div class="prayer-time-box">
                        <span class="prayer-row-time">${formatted.time}</span>
                        <span class="prayer-row-ampm">${formatted.ampm}</span>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function updateNextPrayerAndCountdown() {
            const now = new Date();
            const currentTimeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            let nextPrayer = null;
            for (let i = 0; i < prayersConfig.length; i++) {
                if (prayerTimesData[prayersConfig[i].id] > currentTimeStr) {
                    nextPrayer = prayersConfig[i];
                    break;
                }
            }
            
            let isTomorrow = false;
            if (!nextPrayer) {
                nextPrayer = prayersConfig[0];
                isTomorrow = true;
            }

            document.querySelectorAll('.prayer-row').forEach(r => r.classList.remove('active'));
            document.getElementById(`row-${nextPrayer.id}`).classList.add('active');
            document.getElementById('next-prayer-name').innerText = nextPrayer.name;

            const [nextHours, nextMinutes] = prayerTimesData[nextPrayer.id].split(':');
            let nextDate = new Date();
            nextDate.setHours(parseInt(nextHours), parseInt(nextMinutes), 0, 0);
            if (isTomorrow) nextDate.setDate(nextDate.getDate() + 1);

            const diff = nextDate - now;
            
            if (diff > 0) {
                const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
                const m = Math.floor((diff / 1000 / 60) % 60);
                const s = Math.floor((diff / 1000) % 60);

                document.getElementById('cd-hours').innerText = h.toString().padStart(2, '0');
                document.getElementById('cd-minutes').innerText = m.toString().padStart(2, '0');
                document.getElementById('cd-seconds').innerText = s.toString().padStart(2, '0');
            } else {
                getUserLocation();
            }
        }
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed'));
    });
  }

  // دالة لإعادة التعيين إلى الإعدادات الافتراضية
function resetToDefaults() {
    console.log("تم إعادة التعيين إلى الإعدادات الافتراضية");
    // --- هنا ضع الكود الخاص بك لإعادة التعيين ---
    // مثال: إذا كان هناك عداد، يمكنك إعادة قيمته إلى 0
    // counterElement.innerText = '0';
    // مثال: تغيير نص أو لون شيء ما
    // document.getElementById('some-element').innerText = 'القيمة الافتراضية';
    // مثال: إعادة تعيين متغيرات
    // myCounter = 0;
    // --------------------------------------------
}

// دالة للتحقق من الوقت وتشغيل إعادة التعيين
function checkForNoonReset() {
    const now = new Date();
    // التحقق مما إذا كانت الساعة 12:00 مساءً (12:00 ظهراً)
    if (now.getHours() === 12 && now.getMinutes() === 0) {
        resetToDefaults();
    }
}

// تشغيل الدالة عند تحميل الصفحة للتأكد من أننا لا نفتقد الوقت
checkForNoonReset();

// ضبط مؤقت للتحقق كل دقيقة (60000 ملي ثانية)
setInterval(checkForNoonReset, 60000);
    </script>
</body>
</html>
